<svg width="800" height="450" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="complexityBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f9fa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffecd2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="450" fill="url(#complexityBg)"/>
  
  <!-- Title -->
  <text x="400" y="35" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#2c1810" text-anchor="middle">
    🎯 Complexity Mapping: See Difficulty at a Glance
  </text>
  
  <!-- Article mockup -->
  <rect x="50" y="70" width="700" height="350" rx="10" fill="#fff" stroke="#d4845c" stroke-width="3"/>
  
  <!-- Header -->
  <rect x="70" y="90" width="660" height="40" rx="5" fill="#f8f9fa"/>
  <text x="400" y="115" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#2c1810" text-anchor="middle">
    Understanding Quantum Computing
  </text>
  
  <!-- Paragraph 1 - Easy (Green) -->
  <rect x="70" y="145" width="660" height="50" rx="5" fill="#d3f9d8" stroke="#51cf66" stroke-width="2"/>
  <circle cx="710" cy="170" r="18" fill="#51cf66" stroke="#2b8a3e" stroke-width="2"/>
  <text x="710" y="175" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">15</text>
  <text x="85" y="165" font-family="Arial, sans-serif" font-size="11" fill="#2c1810">
    <tspan x="85" dy="0">Computers help us solve problems. They use electricity to process</tspan>
    <tspan x="85" dy="14">information quickly. Modern computers are very powerful.</tspan>
  </text>
  
  <!-- Paragraph 2 - Medium (Yellow) -->
  <rect x="70" y="210" width="660" height="50" rx="5" fill="#fff3bf" stroke="#ffa94d" stroke-width="2"/>
  <circle cx="710" cy="235" r="18" fill="#ffa94d" stroke="#d4845c" stroke-width="2"/>
  <text x="710" y="240" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">52</text>
  <text x="85" y="230" font-family="Arial, sans-serif" font-size="11" fill="#2c1810">
    <tspan x="85" dy="0">Quantum computers utilize quantum mechanical phenomena such as</tspan>
    <tspan x="85" dy="14">superposition to perform computational operations differently.</tspan>
  </text>
  
  <!-- Paragraph 3 - Hard (Red) -->
  <rect x="70" y="275" width="660" height="65" rx="5" fill="#ffe3e3" stroke="#ff6b6b" stroke-width="2"/>
  <circle cx="710" cy="307" r="18" fill="#ff6b6b" stroke="#c92a2a" stroke-width="2"/>
  <text x="710" y="312" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">89</text>
  <text x="85" y="295" font-family="Arial, sans-serif" font-size="11" fill="#2c1810">
    <tspan x="85" dy="0">The implementation of quantum entanglement facilitates non-local</tspan>
    <tspan x="85" dy="14">correlations between qubits, enabling exponential parallelism in</tspan>
    <tspan x="85" dy="14">algorithmic complexity reduction for specific computational paradigms.</tspan>
  </text>
  
  <!-- Click to simplify indicator -->
  <g transform="translate(600, 305)">
    <rect x="0" y="0" width="90" height="25" rx="12" fill="#ff6b6b" opacity="0.9"/>
    <text x="45" y="17" font-family="Arial, sans-serif" font-size="11" fill="#fff" text-anchor="middle" font-weight="600">
      Click to fix!
    </text>
  </g>
  
  <!-- Paragraph 4 - Medium (Yellow) -->
  <rect x="70" y="355" width="660" height="50" rx="5" fill="#fff3bf" stroke="#ffa94d" stroke-width="2"/>
  <circle cx="710" cy="380" r="18" fill="#ffa94d" stroke="#d4845c" stroke-width="2"/>
  <text x="710" y="385" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#fff" text-anchor="middle">48</text>
  <text x="85" y="375" font-family="Arial, sans-serif" font-size="11" fill="#2c1810">
    <tspan x="85" dy="0">These systems require specialized infrastructure and cryogenic</tspan>
    <tspan x="85" dy="14">cooling to maintain quantum coherence during operations.</tspan>
  </text>
  
  <!-- Legend -->
  <rect x="50" y="430" width="700" height="15" rx="7" fill="#fff" stroke="#d4845c" stroke-width="1"/>
  
  <!-- Green section -->
  <rect x="50" y="430" width="233" height="15" rx="7" fill="#51cf66"/>
  <text x="166" y="441" font-family="Arial, sans-serif" font-size="10" fill="#fff" text-anchor="middle" font-weight="600">
    Easy (0-30)
  </text>
  
  <!-- Yellow section -->
  <rect x="283" y="430" width="234" height="15" fill="#ffa94d"/>
  <text x="400" y="441" font-family="Arial, sans-serif" font-size="10" fill="#fff" text-anchor="middle" font-weight="600">
    Medium (31-70)
  </text>
  
  <!-- Red section -->
  <rect x="517" y="430" width="233" height="15" rx="7" fill="#ff6b6b"/>
  <text x="633" y="441" font-family="Arial, sans-serif" font-size="10" fill="#fff" text-anchor="middle" font-weight="600">
    Hard (71-100)
  </text>
</svg>
