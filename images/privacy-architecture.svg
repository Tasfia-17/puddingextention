<svg width="700" height="500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="privacyBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d0f4de;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffecd2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#51cf66;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2b8a3e;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="700" height="500" fill="url(#privacyBg)"/>
  
  <!-- Title -->
  <text x="350" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#2c1810" text-anchor="middle">
    🔒 Privacy-First Architecture
  </text>
  
  <!-- Shield -->
  <path d="M 350 80 L 320 95 L 320 160 Q 320 200 350 220 Q 380 200 380 160 L 380 95 Z" 
        fill="url(#shieldGradient)" stroke="#2b8a3e" stroke-width="3"/>
  <text x="350" y="160" font-family="Arial, sans-serif" font-size="40" text-anchor="middle">🔒</text>
  
  <!-- Your Device Box -->
  <rect x="100" y="260" width="500" height="200" rx="12" fill="rgba(255,255,255,0.95)" stroke="#51cf66" stroke-width="4"/>
  <text x="350" y="290" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#2b8a3e" text-anchor="middle">
    Your Device (100% Local)
  </text>
  
  <!-- Inside Device - Components -->
  <rect x="120" y="310" width="140" height="60" rx="6" fill="#e3f2fd" stroke="#4285F4" stroke-width="2"/>
  <text x="190" y="335" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#1565c0" text-anchor="middle">
    Gemini Nano
  </text>
  <text x="190" y="352" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">
    Offline AI
  </text>
  
  <rect x="280" y="310" width="140" height="60" rx="6" fill="#fff3bf" stroke="#F4C542" stroke-width="2"/>
  <text x="350" y="335" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#d4845c" text-anchor="middle">
    Your Data
  </text>
  <text x="350" y="352" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">
    Reading patterns
  </text>
  
  <rect x="440" y="310" width="140" height="60" rx="6" fill="#ffe3e3" stroke="#ff6b6b" stroke-width="2"/>
  <text x="510" y="335" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#c92a2a" text-anchor="middle">
    Pudding Engine
  </text>
  <text x="510" y="352" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">
    Processing
  </text>
  
  <!-- Storage -->
  <rect x="120" y="385" width="460" height="60" rx="6" fill="#f3f4f6" stroke="#868e96" stroke-width="2"/>
  <text x="350" y="410" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#495057" text-anchor="middle">
    💾 Local Storage
  </text>
  <text x="350" y="427" font-family="Arial, sans-serif" font-size="10" fill="#333" text-anchor="middle">
    All preferences and learning data stored locally
  </text>
  
  <!-- Cloud with X -->
  <g transform="translate(50, 100)">
    <ellipse cx="0" cy="0" rx="40" ry="25" fill="#dee2e6" opacity="0.5"/>
    <ellipse cx="-20" cy="-5" rx="25" ry="20" fill="#dee2e6" opacity="0.5"/>
    <ellipse cx="20" cy="-5" rx="25" ry="20" fill="#dee2e6" opacity="0.5"/>
    <line x1="-20" y1="-20" x2="20" y2="20" stroke="#ff6b6b" stroke-width="4" stroke-linecap="round"/>
    <line x1="20" y1="-20" x2="-20" y2="20" stroke="#ff6b6b" stroke-width="4" stroke-linecap="round"/>
    <text x="0" y="50" font-family="Arial, sans-serif" font-size="11" fill="#c92a2a" text-anchor="middle" font-weight="600">
      No Cloud
    </text>
  </g>
  
  <!-- Server with X -->
  <g transform="translate(650, 100)">
    <rect x="-30" y="-15" width="60" height="30" rx="3" fill="#dee2e6" opacity="0.5"/>
    <circle cx="-15" cy="0" r="3" fill="#868e96"/>
    <circle cx="0" cy="0" r="3" fill="#868e96"/>
    <circle cx="15" cy="0" r="3" fill="#868e96"/>
    <line x1="-20" y1="-20" x2="20" y2="20" stroke="#ff6b6b" stroke-width="4" stroke-linecap="round"/>
    <line x1="20" y1="-20" x2="-20" y2="20" stroke="#ff6b6b" stroke-width="4" stroke-linecap="round"/>
    <text x="0" y="50" font-family="Arial, sans-serif" font-size="11" fill="#c92a2a" text-anchor="middle" font-weight="600">
      No Servers
    </text>
  </g>
  
  <!-- Tracking with X -->
  <g transform="translate(50, 380)">
    <circle cx="0" cy="0" r="20" fill="#dee2e6" opacity="0.5"/>
    <circle cx="0" cy="0" r="8" fill="#868e96" opacity="0.5"/>
    <line x1="-15" y1="-15" x2="15" y2="15" stroke="#ff6b6b" stroke-width="3" stroke-linecap="round"/>
    <line x1="15" y1="-15" x2="-15" y2="15" stroke="#ff6b6b" stroke-width="3" stroke-linecap="round"/>
    <text x="0" y="40" font-family="Arial, sans-serif" font-size="10" fill="#c92a2a" text-anchor="middle" font-weight="600">
      No Tracking
    </text>
  </g>
  
  <!-- API with X -->
  <g transform="translate(650, 380)">
    <rect x="-25" y="-12" width="50" height="24" rx="4" fill="#dee2e6" opacity="0.5"/>
    <text x="0" y="5" font-family="Arial, sans-serif" font-size="10" fill="#868e96" text-anchor="middle" font-weight="bold">API</text>
    <line x1="-20" y1="-15" x2="20" y2="15" stroke="#ff6b6b" stroke-width="3" stroke-linecap="round"/>
    <line x1="20" y1="-15" x2="-20" y2="15" stroke="#ff6b6b" stroke-width="3" stroke-linecap="round"/>
    <text x="0" y="40" font-family="Arial, sans-serif" font-size="10" fill="#c92a2a" text-anchor="middle" font-weight="600">
      No API Calls
    </text>
  </g>
  
  <!-- Bottom guarantee -->
  <rect x="150" y="470" width="400" height="20" rx="10" fill="#51cf66"/>
  <text x="350" y="484" font-family="Arial, sans-serif" font-size="12" fill="#fff" text-anchor="middle" font-weight="bold">
    ✓ Your data never leaves your device
  </text>
</svg>
