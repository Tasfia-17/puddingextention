<svg width="400" height="150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FFE5B4;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#F4C542;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4A574;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#C17817;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5A00;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Happy Pudding -->
  <g transform="translate(75, 30)">
    <ellipse cx="0" cy="95" rx="35" ry="6" fill="#000000" opacity="0.15"/>
    <path d="M -25 75 Q -25 25 0 20 Q 25 25 25 75 L 25 80 Q 25 90 0 90 Q -25 90 -25 80 Z" 
          fill="url(#pGrad)" stroke="#D4A574" stroke-width="2"/>
    <ellipse cx="0" cy="20" rx="25" ry="10" fill="url(#cGrad)"/>
    <circle cx="-10" cy="40" r="3" fill="#8B5A00"/>
    <circle cx="10" cy="40" r="3" fill="#8B5A00"/>
    <path d="M -10 55 Q 0 62 10 55" fill="none" stroke="#8B5A00" stroke-width="2.5" stroke-linecap="round"/>
    <ellipse cx="-18" cy="48" rx="5" ry="3" fill="#FFB6C1" opacity="0.6"/>
    <ellipse cx="18" cy="48" rx="5" ry="3" fill="#FFB6C1" opacity="0.6"/>
    <text x="0" y="115" font-family="Arial, sans-serif" font-size="11" fill="#8b5a3c" text-anchor="middle" font-weight="600">
      Happy
    </text>
  </g>
  
  <!-- Thinking Pudding -->
  <g transform="translate(200, 30)">
    <ellipse cx="0" cy="95" rx="35" ry="6" fill="#000000" opacity="0.15"/>
    <path d="M -25 75 Q -25 25 0 20 Q 25 25 25 75 L 25 80 Q 25 90 0 90 Q -25 90 -25 80 Z" 
          fill="url(#pGrad)" stroke="#D4A574" stroke-width="2"/>
    <ellipse cx="0" cy="20" rx="25" ry="10" fill="url(#cGrad)"/>
    <circle cx="-10" cy="40" r="3" fill="#8B5A00"/>
    <circle cx="10" cy="40" r="3" fill="#8B5A00"/>
    <ellipse cx="0" cy="55" rx="8" ry="5" fill="#8B5A00" opacity="0.3"/>
    <!-- Thought bubble -->
    <circle cx="30" cy="15" r="8" fill="#fff" stroke="#8B5A00" stroke-width="1"/>
    <circle cx="40" cy="8" r="12" fill="#fff" stroke="#8B5A00" stroke-width="1"/>
    <text x="40" y="13" font-family="Arial, sans-serif" font-size="10" fill="#8B5A00" text-anchor="middle">?</text>
    <text x="0" y="115" font-family="Arial, sans-serif" font-size="11" fill="#8b5a3c" text-anchor="middle" font-weight="600">
      Thinking
    </text>
  </g>
  
  <!-- Excited Pudding -->
  <g transform="translate(325, 30)">
    <ellipse cx="0" cy="95" rx="35" ry="6" fill="#000000" opacity="0.15"/>
    <path d="M -25 75 Q -25 25 0 20 Q 25 25 25 75 L 25 80 Q 25 90 0 90 Q -25 90 -25 80 Z" 
          fill="url(#pGrad)" stroke="#D4A574" stroke-width="2"/>
    <ellipse cx="0" cy="20" rx="25" ry="10" fill="url(#cGrad)"/>
    <circle cx="-10" cy="38" r="4" fill="#8B5A00"/>
    <circle cx="10" cy="38" r="4" fill="#8B5A00"/>
    <ellipse cx="0" cy="55" rx="10" ry="8" fill="#8B5A00" opacity="0.8"/>
    <ellipse cx="-18" cy="48" rx="6" ry="4" fill="#FFB6C1" opacity="0.7"/>
    <ellipse cx="18" cy="48" rx="6" ry="4" fill="#FFB6C1" opacity="0.7"/>
    <!-- Sparkles -->
    <text x="-30" y="30" font-family="Arial, sans-serif" font-size="14" fill="#F4C542">✨</text>
    <text x="25" y="30" font-family="Arial, sans-serif" font-size="14" fill="#F4C542">✨</text>
    <text x="0" y="115" font-family="Arial, sans-serif" font-size="11" fill="#8b5a3c" text-anchor="middle" font-weight="600">
      Excited
    </text>
  </g>
</svg>
