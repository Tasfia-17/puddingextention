<svg width="800" height="500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="problemBg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#fa5252;stop-opacity:0.3" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="#fff9f0"/>
  
  <!-- Title -->
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#c92a2a" text-anchor="middle">
    The Problem
  </text>
  
  <!-- Web Content Box -->
  <rect x="50" y="80" width="200" height="80" rx="10" fill="url(#problemBg)" stroke="#ff6b6b" stroke-width="2"/>
  <text x="150" y="115" font-family="Arial, sans-serif" font-size="16" font-weight="600" fill="#c92a2a" text-anchor="middle">
    Web Content
  </text>
  <text x="150" y="140" font-family="Arial, sans-serif" font-size="12" fill="#c92a2a" text-anchor="middle">
    Complex • Dense
  </text>
  
  <!-- Arrow -->
  <path d="M 250 120 L 300 120" stroke="#868e96" stroke-width="3" fill="none"/>
  <polygon points="300,120 290,115 290,125" fill="#868e96"/>
  
  <!-- Reading Challenges -->
  <rect x="300" y="70" width="200" height="100" rx="10" fill="#fff" stroke="#ff6b6b" stroke-width="2"/>
  <text x="400" y="95" font-family="Arial, sans-serif" font-size="14" font-weight="600" fill="#c92a2a" text-anchor="middle">
    Reading Challenges
  </text>
  <text x="320" y="120" font-family="Arial, sans-serif" font-size="11" fill="#495057">
    • Complex language
  </text>
  <text x="320" y="140" font-family="Arial, sans-serif" font-size="11" fill="#495057">
    • Dense paragraphs
  </text>
  <text x="320" y="160" font-family="Arial, sans-serif" font-size="11" fill="#495057">
    • Distractions
  </text>
  
  <!-- Arrows to problems -->
  <path d="M 400 170 L 150 250" stroke="#868e96" stroke-width="2" fill="none"/>
  <path d="M 400 170 L 400 250" stroke="#868e96" stroke-width="2" fill="none"/>
  <path d="M 400 170 L 650 250" stroke="#868e96" stroke-width="2" fill="none"/>
  
  <!-- Problem 1: ADHD -->
  <g transform="translate(50, 250)">
    <rect x="0" y="0" width="180" height="120" rx="10" fill="#fff" stroke="#ff6b6b" stroke-width="2"/>
    <circle cx="90" cy="30" r="20" fill="#ff6b6b" opacity="0.2"/>
    <text x="90" y="38" font-family="Arial, sans-serif" font-size="24" text-anchor="middle">⚡</text>
    <text x="90" y="65" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#c92a2a" text-anchor="middle">
      ADHD Users
    </text>
    <text x="10" y="85" font-family="Arial, sans-serif" font-size="10" fill="#495057">
      • Can't focus
    </text>
    <text x="10" y="100" font-family="Arial, sans-serif" font-size="10" fill="#495057">
      • Too many distractions
    </text>
    <text x="10" y="115" font-family="Arial, sans-serif" font-size="10" fill="#495057">
      • Lose track of content
    </text>
  </g>
  
  <!-- Problem 2: Dyslexia -->
  <g transform="translate(310, 250)">
    <rect x="0" y="0" width="180" height="120" rx="10" fill="#fff" stroke="#ff6b6b" stroke-width="2"/>
    <circle cx="90" cy="30" r="20" fill="#ff6b6b" opacity="0.2"/>
    <text x="90" y="38" font-family="Arial, sans-serif" font-size="24" text-anchor="middle">📖</text>
    <text x="90" y="65" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#c92a2a" text-anchor="middle">
      Dyslexia Users
    </text>
    <text x="10" y="85" font-family="Arial, sans-serif" font-size="10" fill="#495057">
      • Words jumble
    </text>
    <text x="10" y="100" font-family="Arial, sans-serif" font-size="10" fill="#495057">
      • Hard to track lines
    </text>
    <text x="10" y="115" font-family="Arial, sans-serif" font-size="10" fill="#495057">
      • Slow reading speed
    </text>
  </g>
  
  <!-- Problem 3: Cognitive Load -->
  <g transform="translate(570, 250)">
    <rect x="0" y="0" width="180" height="120" rx="10" fill="#fff" stroke="#ff6b6b" stroke-width="2"/>
    <circle cx="90" cy="30" r="20" fill="#ff6b6b" opacity="0.2"/>
    <text x="90" y="38" font-family="Arial, sans-serif" font-size="24" text-anchor="middle">🧠</text>
    <text x="90" y="65" font-family="Arial, sans-serif" font-size="13" font-weight="600" fill="#c92a2a" text-anchor="middle">
      Everyone Else
    </text>
    <text x="10" y="85" font-family="Arial, sans-serif" font-size="10" fill="#495057">
      • Information overload
    </text>
    <text x="10" y="100" font-family="Arial, sans-serif" font-size="10" fill="#495057">
      • Complex jargon
    </text>
    <text x="10" y="115" font-family="Arial, sans-serif" font-size="10" fill="#495057">
      • Mental exhaustion
    </text>
  </g>
  
  <!-- Impact -->
  <rect x="250" y="410" width="300" height="60" rx="10" fill="#ff6b6b" opacity="0.9"/>
  <text x="400" y="435" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#fff" text-anchor="middle">
    Result: Frustration &amp; Abandonment
  </text>
  <text x="400" y="455" font-family="Arial, sans-serif" font-size="12" fill="#fff" text-anchor="middle">
    15M+ people struggle daily
  </text>
</svg>
