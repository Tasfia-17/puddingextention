<svg width="800" height="600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#f8f9fa;stop-opacity:0.95" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="600" fill="url(#bgGrad)"/>
  
  <!-- Title Card -->
  <rect x="50" y="30" width="700" height="120" rx="15" fill="url(#cardGrad)" opacity="0.95"/>
  <text x="400" y="75" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="#2c3e50" text-anchor="middle">
    Pudding × Lingo.dev
  </text>
  <text x="400" y="110" font-family="Arial, sans-serif" font-size="18" fill="#7f8c8d" text-anchor="middle">
    Making Accessibility Global - 10 Languages, 5B+ People
  </text>
  <text x="400" y="135" font-family="Arial, sans-serif" font-size="14" fill="#95a5a6" text-anchor="middle">
    Multilingual Hackathon #2 Submission
  </text>
  
  <!-- Stats Cards -->
  <!-- Card 1: Languages -->
  <rect x="50" y="180" width="220" height="140" rx="10" fill="url(#cardGrad)"/>
  <circle cx="160" cy="220" r="25" fill="#FF6B6B" opacity="0.2"/>
  <text x="160" y="230" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#FF6B6B" text-anchor="middle">
    10
  </text>
  <text x="160" y="260" font-family="Arial, sans-serif" font-size="16" fill="#2c3e50" text-anchor="middle">
    Languages
  </text>
  <text x="160" y="285" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d" text-anchor="middle">
    EN ES FR DE AR
  </text>
  <text x="160" y="305" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d" text-anchor="middle">
    ZH JA HI PT BN
  </text>
  
  <!-- Card 2: Reach -->
  <rect x="290" y="180" width="220" height="140" rx="10" fill="url(#cardGrad)"/>
  <circle cx="400" cy="220" r="25" fill="#4ECDC4" opacity="0.2"/>
  <text x="400" y="230" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#4ECDC4" text-anchor="middle">
    5B+
  </text>
  <text x="400" y="260" font-family="Arial, sans-serif" font-size="16" fill="#2c3e50" text-anchor="middle">
    People Reached
  </text>
  <text x="400" y="285" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d" text-anchor="middle">
    233% increase
  </text>
  <text x="400" y="305" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d" text-anchor="middle">
    from 1.5B to 5B+
  </text>
  
  <!-- Card 3: Performance -->
  <rect x="530" y="180" width="220" height="140" rx="10" fill="url(#cardGrad)"/>
  <circle cx="640" cy="220" r="25" fill="#95E1D3" opacity="0.2"/>
  <text x="640" y="230" font-family="Arial, sans-serif" font-size="32" font-weight="bold" fill="#95E1D3" text-anchor="middle">
    &lt;10ms
  </text>
  <text x="640" y="260" font-family="Arial, sans-serif" font-size="16" fill="#2c3e50" text-anchor="middle">
    Load Time
  </text>
  <text x="640" y="285" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d" text-anchor="middle">
    Zero performance
  </text>
  <text x="640" y="305" font-family="Arial, sans-serif" font-size="11" fill="#7f8c8d" text-anchor="middle">
    impact
  </text>
  
  <!-- Features List -->
  <rect x="50" y="350" width="700" height="200" rx="10" fill="url(#cardGrad)"/>
  <text x="400" y="380" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2c3e50" text-anchor="middle">
    Key Features
  </text>
  
  <!-- Feature items -->
  <circle cx="80" cy="410" r="5" fill="#FF6B6B"/>
  <text x="100" y="415" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">
    ✓ Instant language switching with persistent preferences
  </text>
  
  <circle cx="80" cy="440" r="5" fill="#4ECDC4"/>
  <text x="100" y="445" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">
    ✓ RTL support for Arabic and other right-to-left languages
  </text>
  
  <circle cx="80" cy="470" r="5" fill="#95E1D3"/>
  <text x="100" y="475" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">
    ✓ Complete UI coverage - all elements translated
  </text>
  
  <circle cx="80" cy="500" r="5" fill="#F38181"/>
  <text x="100" y="505" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">
    ✓ Clean Lingo.dev integration with scalable architecture
  </text>
  
  <circle cx="80" cy="530" r="5" fill="#AA96DA"/>
  <text x="100" y="535" font-family="Arial, sans-serif" font-size="14" fill="#2c3e50">
    ✓ Making cognitive accessibility truly global
  </text>
  
  <!-- Footer -->
  <text x="400" y="580" font-family="Arial, sans-serif" font-size="12" fill="#ffffff" text-anchor="middle" opacity="0.8">
    github.com/Tasfia-17/pudding-extention
  </text>
</svg>
