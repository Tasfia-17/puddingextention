<svg width="800" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="beforeBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#ff6b6b;stop-opacity:0.1" />
    </linearGradient>
    <linearGradient id="afterBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#51cf66;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#51cf66;stop-opacity:0.1" />
    </linearGradient>
  </defs>
  
  <!-- Before Section -->
  <rect x="20" y="20" width="360" height="360" rx="10" fill="url(#beforeBg)" stroke="#ff6b6b" stroke-width="2"/>
  
  <text x="200" y="50" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#c92a2a" text-anchor="middle">
    ❌ Before
  </text>
  
  <!-- Dense paragraph -->
  <rect x="40" y="70" width="320" height="100" rx="5" fill="#fff" opacity="0.8"/>
  <text x="50" y="90" font-family="Arial, sans-serif" font-size="11" fill="#333">
    <tspan x="50" dy="0">The implementation of advanced cognitive</tspan>
    <tspan x="50" dy="14">methodologies necessitates comprehensive</tspan>
    <tspan x="50" dy="14">understanding of neurological processing</tspan>
    <tspan x="50" dy="14">mechanisms which facilitate information</tspan>
    <tspan x="50" dy="14">retention and comprehension capabilities...</tspan>
  </text>
  
  <!-- Complexity indicator -->
  <rect x="40" y="185" width="320" height="30" rx="5" fill="#ff6b6b" opacity="0.3"/>
  <text x="200" y="205" font-family="Arial, sans-serif" font-size="12" fill="#c92a2a" text-anchor="middle" font-weight="600">
    🔴 Complexity: 87/100
  </text>
  
  <!-- Distractions -->
  <rect x="40" y="230" width="100" height="60" rx="5" fill="#868e96" opacity="0.5"/>
  <text x="90" y="265" font-family="Arial, sans-serif" font-size="10" fill="#fff" text-anchor="middle">
    Ads
  </text>
  
  <rect x="150" y="230" width="100" height="60" rx="5" fill="#868e96" opacity="0.5"/>
  <text x="200" y="265" font-family="Arial, sans-serif" font-size="10" fill="#fff" text-anchor="middle">
    Sidebar
  </text>
  
  <rect x="260" y="230" width="100" height="60" rx="5" fill="#868e96" opacity="0.5"/>
  <text x="310" y="265" font-family="Arial, sans-serif" font-size="10" fill="#fff" text-anchor="middle">
    Comments
  </text>
  
  <!-- Problems -->
  <text x="200" y="320" font-family="Arial, sans-serif" font-size="12" fill="#c92a2a" text-anchor="middle">
    😰 Hard to read
  </text>
  <text x="200" y="340" font-family="Arial, sans-serif" font-size="12" fill="#c92a2a" text-anchor="middle">
    😵 Cognitive overload
  </text>
  <text x="200" y="360" font-family="Arial, sans-serif" font-size="12" fill="#c92a2a" text-anchor="middle">
    😤 Too many distractions
  </text>
  
  <!-- Arrow -->
  <path d="M 390 200 L 410 200" stroke="#495057" stroke-width="3" fill="none"/>
  <polygon points="410,200 400,195 400,205" fill="#495057"/>
  
  <!-- After Section -->
  <rect x="420" y="20" width="360" height="360" rx="10" fill="url(#afterBg)" stroke="#51cf66" stroke-width="2"/>
  
  <text x="600" y="50" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#2b8a3e" text-anchor="middle">
    ✅ After Pudding
  </text>
  
  <!-- Simplified content -->
  <rect x="440" y="70" width="320" height="30" rx="5" fill="#d4845c" opacity="0.9"/>
  <text x="600" y="90" font-family="Arial, sans-serif" font-size="11" fill="#fff" text-anchor="middle" font-weight="600">
    📌 Key Point: How the brain learns
  </text>
  
  <!-- Bullet points -->
  <rect x="440" y="110" width="320" height="90" rx="5" fill="#fff" opacity="0.9"/>
  <text x="450" y="130" font-family="Arial, sans-serif" font-size="11" fill="#333">
    <tspan x="450" dy="0">• The brain processes information</tspan>
    <tspan x="450" dy="16">• Memory helps us remember</tspan>
    <tspan x="450" dy="16">• Understanding makes learning easier</tspan>
    <tspan x="450" dy="16">• Simple words help everyone</tspan>
  </text>
  
  <!-- Complexity indicator -->
  <rect x="440" y="215" width="320" height="30" rx="5" fill="#51cf66" opacity="0.3"/>
  <text x="600" y="235" font-family="Arial, sans-serif" font-size="12" fill="#2b8a3e" text-anchor="middle" font-weight="600">
    🟢 Complexity: 28/100
  </text>
  
  <!-- Focus mode -->
  <rect x="440" y="260" width="320" height="40" rx="5" fill="#fff" opacity="0.9" stroke="#d4845c" stroke-width="2"/>
  <text x="600" y="285" font-family="Arial, sans-serif" font-size="12" fill="#2c1810" text-anchor="middle" font-weight="600">
    🎯 Focus Mode: Distractions Hidden
  </text>
  
  <!-- Benefits -->
  <text x="600" y="325" font-family="Arial, sans-serif" font-size="12" fill="#2b8a3e" text-anchor="middle">
    😊 Easy to understand
  </text>
  <text x="600" y="345" font-family="Arial, sans-serif" font-size="12" fill="#2b8a3e" text-anchor="middle">
    🧠 Less mental effort
  </text>
  <text x="600" y="365" font-family="Arial, sans-serif" font-size="12" fill="#2b8a3e" text-anchor="middle">
    ⚡ 3x faster reading
  </text>
</svg>
